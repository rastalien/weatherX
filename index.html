<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://api.open-meteo.com https://geocoding-api.open-meteo.com; object-src 'none'; base-uri 'self'; form-action 'self';"
  />
  <title>Weather App</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="container app-shell">
    <aside class="sidebar">
      <section class="sidebar-card top-bar">
        <div class="brand-block">
          <p class="brand-kicker">Meteo personale</p>

          <div id="temperature-unit-toggle" class="unit-toggle" role="group" aria-label="Unita di temperatura">
            <button
              type="button"
              class="unit-toggle-button is-active"
              data-unit="celsius"
              aria-pressed="true"
              aria-label="Mostra temperature in gradi Celsius"
            >&deg;C</button>
            <button
              type="button"
              class="unit-toggle-button"
              data-unit="fahrenheit"
              aria-pressed="false"
              aria-label="Mostra temperature in gradi Fahrenheit"
            >&deg;F</button>
          </div>
        </div>

        <form id="search-form">
          <div class="search-box">
            <label class="sr-only" for="location-input">Cerca citta</label>
            <input
              id="location-input"
              type="text"
              placeholder="Inserisci una citta"
              autocomplete="off"
              aria-autocomplete="list"
              aria-expanded="false"
              aria-controls="location-suggestions"
            >
            <div id="location-suggestions" class="suggestions-root" hidden></div>
          </div>
          <button id="search-button" type="submit">Cerca</button>
        </form>
      </section>

      <section class="sidebar-card favorites-panel desktop-only" aria-labelledby="favorites-title">
        <div class="sidebar-section-header">
          <h2 id="favorites-title" class="sidebar-title">Preferite</h2>
          <p class="sidebar-copy">Le localita salvate restano sempre a portata di click.</p>
        </div>
        <div id="favorites-root" class="favorites-root"></div>
      </section>

      <section class="sidebar-card favorites-panel mobile-only" aria-labelledby="mobile-favorites-title">
        <div class="sidebar-section-header">
          <h2 id="mobile-favorites-title" class="sidebar-title">Preferite</h2>
          <p class="sidebar-copy">Anche da mobile puoi riaprire al volo le localita salvate.</p>
        </div>
        <div id="mobile-favorites-root" class="mobile-favorites-root"></div>
      </section>
    </aside>

    <section class="content-panel">
      <section
        id="weather-root"
        class="weather-root"
        aria-live="polite"
        aria-atomic="true"
        aria-busy="false"
      >
      </section>
    </section>
  </main>

  <div id="feedback-root" class="feedback-root" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
